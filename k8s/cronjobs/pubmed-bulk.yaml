apiVersion: batch/v1
kind: CronJob
metadata:
  name: pubmed-bulk-sync
  namespace: asgard-services
  labels:
    app.kubernetes.io/part-of: mimir
    app.kubernetes.io/component: data-source-sync
    source: pubmed
    cost-tier: free
spec:
  schedule: "0 3 * * 0"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 21600
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: mimir
            source: pubmed
            mode: bulk
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: python:3.12-slim
              command: ["python3", "/scripts/sync_pubmed_pmc_bulk.py"]
              args: ["--mode", "incremental", "--latest-n", "1", "--limit", "1000"]
              env:
                - name: HEIMDALL_BASE
                  value: "http://heimdall.asgard-services.svc.cluster.local:8080"
                - name: QDRANT_URL
                  value: "http://qdrant.asgard-infra.svc.cluster.local:6333"
                - name: TENANT_ID
                  value: "__global__"
                - name: CACHE_DIR
                  value: "/cache"
                - name: HEIMDALL_KEY
                  valueFrom:
                    secretKeyRef:
                      name: heimdall-credentials
                      key: api_key
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: cache
                  mountPath: /cache
              resources:
                requests:
                  cpu: 200m
                  memory: 1Gi
                limits:
                  cpu: 1000m
                  memory: 4Gi
          volumes:
            - name: scripts
              configMap:
                name: pubmed-sync-scripts
                defaultMode: 0555
            - name: cache
              persistentVolumeClaim:
                claimName: pubmed-bulk-cache
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pubmed-bulk-cache
  namespace: asgard-services
  labels:
    app.kubernetes.io/part-of: mimir
    source: pubmed
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
