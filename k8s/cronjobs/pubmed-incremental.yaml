apiVersion: batch/v1
kind: CronJob
metadata:
  name: pubmed-incremental-sync
  namespace: asgard-services
  labels:
    app.kubernetes.io/part-of: mimir
    app.kubernetes.io/component: data-source-sync
    source: pubmed
    cost-tier: free
spec:
  schedule: "0 6 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/part-of: mimir
            source: pubmed
            mode: incremental
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: python:3.12-slim
              command: ["python3", "/scripts/sync_pubmed_incremental.py"]
              env:
                - name: DAYS_BACK
                  value: "1"
                - name: MAX_RECORDS
                  value: "500"
                - name: HEIMDALL_BASE
                  value: "http://heimdall.asgard-services.svc.cluster.local:8080"
                - name: QDRANT_URL
                  value: "http://qdrant.asgard-infra.svc.cluster.local:6333"
                - name: TENANT_ID
                  value: "__global__"
                - name: NCBI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: pubmed-credentials
                      key: ncbi_api_key
                      optional: true
                - name: NCBI_EMAIL
                  valueFrom:
                    secretKeyRef:
                      name: pubmed-credentials
                      key: ncbi_email
                      optional: true
                - name: HEIMDALL_KEY
                  valueFrom:
                    secretKeyRef:
                      name: heimdall-credentials
                      key: api_key
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: scripts
              configMap:
                name: pubmed-sync-scripts
                defaultMode: 0555
