---
# Step 1: Bootstrap a completely self-signed issuer
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: asgard-selfsigned-issuer
spec:
  selfSigned: {}

---
# Step 2: Generate a Root CA certificate using the self-signed issuer
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: asgard-root-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: Asgard Private Enterprise Root CA
  secretName: asgard-root-secret
  # Roots must be long-lived. Without these fields cert-manager defaults the
  # root to 90 days, which silently expires the trust anchor every quarter.
  # 10y lifetime, renew 90d early. rotationPolicy:Never preserves the key on
  # renewal so every already-issued leaf cert stays valid across re-issues.
  duration: 87600h    # 10 years
  renewBefore: 2160h  # 90 days
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Never
  issuerRef:
    name: asgard-selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io

---
# Step 3: Create the final ClusterIssuer that issues certs using our new Root CA
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: asgard-ca-issuer
spec:
  ca:
    secretName: asgard-root-secret
