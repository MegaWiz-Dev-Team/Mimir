# ============================================================================
# Project Mimir — Production Docker Compose (Issue #160)
# ============================================================================
# Usage: docker compose -f docker-compose.prod.yml up -d
# Requires: .env file (copy from .env.example)
# ============================================================================

services:
  mariadb:
    image: mariadb:11
    container_name: mimir_mariadb
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MARIADB_DATABASE:-mimir}
      MYSQL_USER: ${MARIADB_USER:-mimir}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD:-REDACTED-PW}
    volumes:
      - ./data/mariadb:/var/lib/mysql
    restart: always
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  qdrant:
    image: qdrant/qdrant
    container_name: mimir_qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:6333/healthz" ]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 6G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: mimir_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  rustfs:
    image: rustfs/rustfs:latest
    container_name: mimir_rustfs
    ports:
      - "${RUSTFS_PORT:-9000}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs_data:/data
    environment:
      RUSTFS_ROOT_USER: ${RUSTFS_ROOT_USER:-minioadmin}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_ROOT_PASSWORD:-minioadmin}
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  vault:
    image: hashicorp/vault:1.15
    container_name: mimir_vault
    ports:
      - "${VAULT_PORT:-8200}:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-mimir-dev-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "vault", "status" ]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  qdrant_storage:
  rustfs_data:


networks:
  default:
    name: mimir_network
