[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    integration: integration tests (require K8s services)
    slow: slow tests (>1s)
    unit: unit tests (fast, no external services)

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Coverage (if pytest-cov installed)
# addopts = --cov=insurance_ingestion --cov-report=html
