services:
  qdrant:
    image: qdrant/qdrant
    container_name: mimir_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always
    # deploy:
    #   resources:
    #     limits:
    #       memory: 6G

  mariadb:
    image: mariadb:11
    container_name: mimir_mariadb
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mimir
      MYSQL_USER: mimir
      MYSQL_PASSWORD: mimir_password
    volumes:
      - ./data/mariadb:/var/lib/mysql
    restart: always
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4G

  redis:
    image: redis:7-alpine
    container_name: mimir_redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    restart: always
    # deploy:
    #   resources:
    #     limits:
    #       memory: 2G

  rustfs:
    image: rustfs/rustfs:latest
    container_name: mimir_rustfs
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - rustfs_data:/data
    environment:
      RUSTFS_ROOT_USER: minioadmin
      RUSTFS_ROOT_PASSWORD: minioadmin
    restart: always

  vault:
    image: hashicorp/vault:1.15
    container_name: mimir_vault
    ports:
      - "8201:8200"
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - ./data/vault:/vault/file
      - ./config/vault/vault-config.hcl:/vault/config/vault-config.hcl:ro
      - ./config/vault/entrypoint.sh:/vault/entrypoint.sh:ro
    entrypoint: /vault/entrypoint.sh
    healthcheck:
      test: [ "CMD", "vault", "status", "-address=http://127.0.0.1:8200" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: mimir_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/mimir_neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
    restart: always

volumes:
  qdrant_storage:
  rustfs_data:


networks:
  default:
    name: mimir_network
