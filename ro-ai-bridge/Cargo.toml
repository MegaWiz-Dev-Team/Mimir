[package]
name = "ro-ai-bridge"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.101"
chrono = "0.4.39"
axum = "0.8.8"
chromiumoxide = "0.8.0"
dotenvy = "0.15.7"
futures = "0.3.32"
html2md = "0.2.15"
reqwest = { version = "0.13.2", features = ["json", "rustls"] }
reqwest-eventsource = "0.6.0"
rig-core = "0.10.0"
schemars = "0.8"
scraper = "0.25.0"
serde = "1.0.228"
serde_json = "1.0.149"
sqlx = { version = "0.8.6", features = ["runtime-tokio-rustls", "mysql"] }
tokio = { version = "1.49.0", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = "0.3.22"
regex = "1.10.0"
